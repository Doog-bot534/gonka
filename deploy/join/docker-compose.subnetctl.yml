services:
  subnetctl:
    container_name: ${SUBNET_INSTANCE_NAME:-subnetctl}
    image: libermans/gonka-subnet-proxy:latest
    env_file:
      - ${SUBNET_ENV_FILE:-./config.subnet.env}
    environment:
      - SUBNET_CHAIN_REST=http://node:1317
      - SUBNET_PORT=8080
      - SUBNET_STORAGE_DIR=/root/.subnetctl
    volumes:
      - ${SUBNET_STORAGE_HOST_DIR:-.subnetctl}:/root/.subnetctl
    expose:
      - "8080"
    networks:
      join_default:
        aliases:
          - subnet-pool
          - subnetctl-multi
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  join_default:
    external: true
