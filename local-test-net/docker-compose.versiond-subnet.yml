services:
  versiond:
    container_name: ${KEY_NAME}-versiond
    image: versiond:latest
    build:
      context: ./versioned
      dockerfile: Dockerfile
    environment:
      VERSIOND_ORACLE_URL: http://${KEY_NAME}-api:9100/versions
      VERSIOND_POLL_INTERVAL: "5s"
      VERSIOND_BIN_DIR: /opt/versiond/bin
      VERSIOND_DATA_DIR: /opt/versiond/data
      VERSIOND_BINARY_NAME: subnetctl
      SUBNET_CHAIN_REST: http://${KEY_NAME}-node:1317
      SUBNET_MODEL: "Qwen/Qwen2.5-7B-Instruct"
    ports:
      - "${VERSIOND_PORT:-7080}:8080"
    networks:
      - chain-public

  testsubnet-server:
    container_name: ${KEY_NAME}-testsubnet-server
    image: testsubnet-server:latest
    build:
      context: .
      dockerfile: local-test-net/Dockerfile.testsubnet-server
    ports:
      - "${TESTSUBNET_SERVER_PORT:-7090}:8080"
    networks:
      - chain-public
